name: Node.js CI

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for build (Node 20 falls back to 22)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version == '20' && '22' || matrix.node-version }}

      - run: npm install
      - run: npm run build

      - name: Use Node.js ${{ matrix.node-version }}
        if: matrix.node-version == '20'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - if: matrix.node-version == '20'
        run: make -C builder smoke

      - if: matrix.node-version != '20'
        run: npm test
