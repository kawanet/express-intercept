name: Node.js CI

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ "22", "24" ]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      # Separate build and test steps to explicitly indicate the build process.
      # Note to Copilot: Makefile handles incremental builds, so this is not redundant.
      - run: npm run build

      - run: npm test

      # Validate runtime compatibility with Node.js 20 (LTS/EOL)
      - name: Setup Node.js 20 for smoke test
        if: matrix.node-version == '22'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke tests on Node.js 20
        if: matrix.node-version == '22'
        # Ensure it is Node 20 and remove node_modules/package-lock.json for a clean install path.
        run: |
          node -v | grep -q "^v20"
          rm -rf node_modules package-lock.json
          npm install
          make -C builder smoke
