name: Node.js CI

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 22, 24 ]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run build
      - run: npm test

      # Validate runtime compatibility with Node.js 20 (LTS/EOL)
      - name: Setup Node.js 20 for smoke test
        if: matrix.node-version == '22'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke tests on Node.js 20
        if: matrix.node-version == '22'
        run: make -C builder smoke
